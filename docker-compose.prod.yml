# Docker Compose file for ACCESS-CI MCP Servers - Production
# Uses pre-built images from GitHub Container Registry

services:
  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - mcp-compute-resources
      - mcp-system-status
      - mcp-software-discovery
      - mcp-xdmod
      - mcp-allocations
      - mcp-nsf-awards
      - mcp-xdmod-data
      - mcp-announcements
      - mcp-documentation
      - mcp-events
      - mcp-affinity-groups
      - mcp-jsm
      - mcp-auth

  # OAuth Auth Service
  mcp-auth:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/auth:latest
    ports:
      - "3013:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CILOGON_CLIENT_ID=${CILOGON_CLIENT_ID}
      - CILOGON_CLIENT_SECRET=${CILOGON_CLIENT_SECRET}
      - OAUTH_EXTERNAL_BASE_URL=https://mcp.access-ci.org/auth
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - HONEYCOMB_DATASET=${HONEYCOMB_DATASET:-access-ci-mcp}
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  # TypeScript MCP Servers
  mcp-affinity-groups:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/affinity-groups:latest
    ports:
      - "3011:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/affinity-groups
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-compute-resources:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/compute-resources:latest
    ports:
      - "3002:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/compute-resources
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-system-status:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/system-status:latest
    ports:
      - "3003:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/system-status
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-software-discovery:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/software-discovery:latest
    ports:
      - "3004:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SDS_API_KEY=${SDS_API_KEY}
      - MCP_PATH_PREFIX=/software-discovery
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-xdmod:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/xdmod:latest
    ports:
      - "3005:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/xdmod
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-allocations:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/allocations:latest
    ports:
      - "3006:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ACCESS_MCP_SERVICES=${ACCESS_MCP_SERVICES}
      - MCP_PATH_PREFIX=/allocations
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
      # Drupal account holding the mcp_service role (required for the
      # X-Acting-User header get_rp_account sends).
      - DRUPAL_API_URL=${DRUPAL_API_URL:-https://support.access-ci.org}
      - DRUPAL_USERNAME=${MCP_SERVICE_DRUPAL_USERNAME}
      - DRUPAL_PASSWORD=${MCP_SERVICE_DRUPAL_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-nsf-awards:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/nsf-awards:latest
    ports:
      - "3007:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/nsf-awards
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-announcements:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/announcements:latest
    ports:
      - "3009:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DRUPAL_API_URL=${DRUPAL_API_URL:-https://support.access-ci.org}
      - DRUPAL_USERNAME=${DRUPAL_USERNAME}
      - DRUPAL_PASSWORD=${DRUPAL_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/announcements
      - OAUTH_VERIFY_URL=http://mcp-auth:3000/verify
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-documentation:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/documentation:latest
    ports:
      - "3014:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ACCESS_AI_API_KEY=${ACCESS_AI_API_KEY}
      - MCP_PATH_PREFIX=/documentation
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-events:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/events:latest
    ports:
      - "3010:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DRUPAL_API_URL=${DRUPAL_API_URL:-https://support.access-ci.org}
      - DRUPAL_USERNAME=${DRUPAL_USERNAME}
      - DRUPAL_PASSWORD=${DRUPAL_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/events
      - OAUTH_VERIFY_URL=http://mcp-auth:3000/verify
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-jsm:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/jsm:latest
    ports:
      - "3012:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JSM_PROXY_URL=${JSM_PROXY_URL}
      - JSM_DRY_RUN=false
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/jsm
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    deploy:
      resources:
        limits:
          memory: 128M

  # Python MCP Server
  mcp-xdmod-data:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/xdmod-mcp-data:latest
    ports:
      - "3008:3000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - XDMOD_API_TOKEN=${XDMOD_API_TOKEN}
      - PORT=3000
      - MCP_PATH_PREFIX=/xdmod-data
      - MCP_USAGE_DB_URL=${MCP_USAGE_DB_URL:-postgresql://mcp_usage_app:mcpusage@mcp-usage-db:5432/mcp_usage}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # Reporting dashboard (Nuxt) — image built by necyberteam/access-agent-reporting.
  # On BOTH networks: default (mcp-network) so Caddy can route qa.access-ci.org/dashboard
  # to it, and the agent project's network so it reads the agent's Postgres by
  # service name (never the host loopback).
  dashboard:
    image: ghcr.io/necyberteam/access-agent-reporting/dashboard:latest
    expose:
      - "3000"
    restart: unless-stopped
    environment:
      - NUXT_DATABASE_URL=postgresql://reporting_app:${REPORTING_DB_PASSWORD}@postgres:5432/langgraph
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD}
      - NUXT_OAUTH_OIDC_CLIENT_ID=${NUXT_OAUTH_OIDC_CLIENT_ID}
      - NUXT_OAUTH_OIDC_CLIENT_SECRET=${NUXT_OAUTH_OIDC_CLIENT_SECRET}
      - NUXT_OAUTH_OIDC_OPENID_CONFIG=https://cilogon.org/.well-known/openid-configuration
      - NUXT_OAUTH_OIDC_REDIRECT_URL=${NUXT_OAUTH_OIDC_REDIRECT_URL:-https://qa.access-ci.org/dashboard/api/auth/cilogon}
      - NUXT_REPORTING_OPERATORS=${NUXT_REPORTING_OPERATORS}
      - NUXT_REPORTING_REVIEWERS=${NUXT_REPORTING_REVIEWERS}
    networks:
      - default
      - agent-network
    deploy:
      resources:
        limits:
          memory: 256M

  # Daily pg_dump of the reporting schema (human review data — the most
  # expensive thing in the system to recreate). Keeps 14 days. Dumps to a
  # docker volume on the same host as the DB — v1, revisit for off-host.
  reporting-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$${POSTGRES_PASSWORD:-postgres} pg_dump -h postgres -U postgres -d langgraph \
            --schema=reporting --no-owner \
            -f /backups/reporting-$$(date +%F).sql \
            && echo "reporting backup $$(date +%F) done" \
            || echo "reporting backup failed (schema not provisioned yet?) — will retry in 24h"
          find /backups -name 'reporting-*.sql' -mtime +14 -delete
          sleep 86400
        done
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - reporting_backups:/backups
    networks:
      - agent-network
    deploy:
      resources:
        limits:
          memory: 64M

  # Dedicated Postgres for MCP usage analytics. Deliberately on mcp-network only
  # (NOT the agent's network) so the MCP servers reach it by service name without
  # gaining lateral reachability to the agent stack. The MCP usage logger creates
  # its own `mcp_usage` schema + tables on first write (CREATE ... IF NOT EXISTS);
  # this only provisions the DB and the login role it connects as.
  mcp-usage-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcp_usage_app
      POSTGRES_PASSWORD: ${MCP_USAGE_DB_PASSWORD:-mcpusage}
      POSTGRES_DB: mcp_usage
    volumes:
      - mcp_usage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_usage_app -d mcp_usage"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # Daily backup of the mcp_usage schema on the dedicated DB. Same pattern as
  # reporting-backup, but points at mcp-usage-db (mcp-network), not the agent DB.
  mcp-usage-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      mcp-usage-db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          PGPASSWORD=$${MCP_USAGE_DB_PASSWORD:-mcpusage} pg_dump -h mcp-usage-db -U mcp_usage_app -d mcp_usage \
            --schema=mcp_usage --no-owner \
            -f /backups/mcp_usage-$$(date +%F).sql \
            && echo "mcp_usage backup $$(date +%F) done" \
            || echo "mcp_usage backup failed (schema not provisioned yet?) — will retry in 24h"
          find /backups -name 'mcp_usage-*.sql' -mtime +14 -delete
          sleep 86400
        done
    environment:
      - MCP_USAGE_DB_PASSWORD=${MCP_USAGE_DB_PASSWORD:-mcpusage}
    volumes:
      - mcp_usage_backups:/backups
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  caddy_data:
  caddy_config:
  reporting_backups:
  mcp_usage_data:
  mcp_usage_backups:

networks:
  default:
    name: mcp-network
  # The agent compose project's network — joined so dashboard/backup reach
  # the agent's Postgres by service name.
  agent-network:
    external: true
    name: access-agent_agent-network
