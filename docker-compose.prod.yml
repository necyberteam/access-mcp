# Docker Compose file for ACCESS-CI MCP Servers - Production
# Uses pre-built images from GitHub Container Registry

services:
  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - mcp-compute-resources
      - mcp-system-status
      - mcp-software-discovery
      - mcp-xdmod
      - mcp-allocations
      - mcp-nsf-awards
      - mcp-xdmod-data
      - mcp-announcements
      - mcp-events
      - mcp-affinity-groups
      - mcp-jsm
      - mcp-auth

  # OAuth Auth Service
  mcp-auth:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/auth:latest
    ports:
      - "3013:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CILOGON_CLIENT_ID=${CILOGON_CLIENT_ID}
      - CILOGON_CLIENT_SECRET=${CILOGON_CLIENT_SECRET}
      - OAUTH_EXTERNAL_BASE_URL=https://mcp.access-ci.org/auth
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - HONEYCOMB_DATASET=${HONEYCOMB_DATASET:-access-ci-mcp}
    deploy:
      resources:
        limits:
          memory: 128M

  # TypeScript MCP Servers
  mcp-affinity-groups:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/affinity-groups:latest
    ports:
      - "3011:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/affinity-groups
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-compute-resources:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/compute-resources:latest
    ports:
      - "3002:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/compute-resources
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-system-status:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/system-status:latest
    ports:
      - "3003:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/system-status
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-software-discovery:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/software-discovery:latest
    ports:
      - "3004:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SDS_API_KEY=${SDS_API_KEY}
      - MCP_PATH_PREFIX=/software-discovery
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-xdmod:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/xdmod:latest
    ports:
      - "3005:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/xdmod
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-allocations:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/allocations:latest
    ports:
      - "3006:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ACCESS_MCP_SERVICES=${ACCESS_MCP_SERVICES}
      - MCP_PATH_PREFIX=/allocations
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-nsf-awards:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/nsf-awards:latest
    ports:
      - "3007:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MCP_PATH_PREFIX=/nsf-awards
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-announcements:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/announcements:latest
    ports:
      - "3009:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DRUPAL_API_URL=${DRUPAL_API_URL:-https://support.access-ci.org}
      - DRUPAL_USERNAME=${DRUPAL_USERNAME}
      - DRUPAL_PASSWORD=${DRUPAL_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/announcements
      - OAUTH_VERIFY_URL=http://mcp-auth:3000/verify
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-events:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/events:latest
    ports:
      - "3010:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DRUPAL_API_URL=${DRUPAL_API_URL:-https://support.access-ci.org}
      - DRUPAL_USERNAME=${DRUPAL_USERNAME}
      - DRUPAL_PASSWORD=${DRUPAL_PASSWORD}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/events
      - OAUTH_VERIFY_URL=http://mcp-auth:3000/verify
    deploy:
      resources:
        limits:
          memory: 128M

  mcp-jsm:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/jsm:latest
    ports:
      - "3012:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JSM_PROXY_URL=${JSM_PROXY_URL}
      - JSM_DRY_RUN=false
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PATH_PREFIX=/jsm
    deploy:
      resources:
        limits:
          memory: 128M

  # Python MCP Server
  mcp-xdmod-data:
    image: ghcr.io/${GITHUB_REPOSITORY:-necyberteam/access-mcp}/xdmod-mcp-data:latest
    ports:
      - "3008:3000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - XDMOD_API_TOKEN=${XDMOD_API_TOKEN}
      - PORT=3000
      - MCP_PATH_PREFIX=/xdmod-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: mcp-network
